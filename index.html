<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Character Popularity Rankings</title>

  <!-- Remove any static link/script tags you had before.
       This small inline script injects the stylesheet and module script
       with a random query token to bust caches while you develop. -->
  <script>
    (function() {
      const token = Math.random().toString(36).slice(2,9);
      const cssHref = `style.css?v=${token}`;
      const jsSrc = `script.js?v=${token}`;

      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = cssHref;
      document.head.appendChild(link);

      const mod = document.createElement('script');
      mod.type = 'module';
      mod.src = jsSrc;
      document.head.appendChild(mod);
    })();
  </script>
</head>
<body>
  <header>
    <h1 id="site-title">Character Popularity Rankings</h1>
    <div id="controls">
      <div id="tag-filter" aria-label="Filter by tag"></div>
      <button id="reset-filter" style="display:none;">Show all</button>
    </div>
  </header>

  <main>
    <section id="character-list" aria-live="polite"></section>
  </main>

  <footer>
    <small>Built with ❤️</small>
  </footer>
</body>
</html>
