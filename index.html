<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Character Popularity Rankings</title>
<!-- replace your static tags with this -->
<script>
  // generate a short random token; use Date.now() for monotonic versioning
  const rand = Math.random().toString(36).slice(2,9); 
  const cssHref = `style.css?v=${rand}`;
  const jsSrc = `script.js?v=${rand}`;

  // inject stylesheet
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = cssHref;
  document.head.appendChild(link);

  // inject module script
  const mod = document.createElement('script');
  mod.type = 'module';
  mod.src = jsSrc;
  document.head.appendChild(mod);
</script>


</head>

<body>

<header>
  <h1>Character Popularity Rankings</h1>
  <p>Vote for your favorite characters and explore by tags</p>
</header>

<div id="tag-filter"></div>
<div id="character-list"></div>

      ${c.tags.map(t => `<span class="tag">${t}</span>`).join("")}
    </div>
  </div>

    <p class="series"><strong>Series:</strong> ${c.series}</p>
    <p class="votes"><strong>Votes:</strong> ${c.votes}</p>
    <button onclick="vote('${c.name}')">Vote</button>
  </div>
`;


</body>
</html>
